<!doctype html>
<html lang="en" dir="ltr" data-theme="light" data-language="en" data-direction="ltr">
<head>
  <meta charset="utf-8">
  <title>AI Ticketing Assistant</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (() => {
      const storageKey = 'ai-ticketing-theme';
      const valid = ['system', 'light', 'dark'];
      const stored = localStorage.getItem(storageKey);
      const preference = valid.includes(stored) ? stored : 'system';
      const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.themePreference = preference;
      document.documentElement.dataset.theme = preference === 'system' ? (systemDark ? 'dark' : 'light') : preference;

      const languageStorageKey = 'ai-ticketing-language';
      const storedLanguage = localStorage.getItem(languageStorageKey);
      const language = storedLanguage === 'ar' ? 'ar' : 'en';
      const direction = language === 'ar' ? 'rtl' : 'ltr';
      document.documentElement.lang = language;
      document.documentElement.dir = direction;
      document.documentElement.dataset.language = language;
      document.documentElement.dataset.direction = direction;
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
